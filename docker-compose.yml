services:
  proxy:
    build:
      context: ./apps/proxy
    ports:
      - "8080:8080"
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      RUN_TOKEN_SECRET: ${RUN_TOKEN_SECRET}
      PROXY_CORS_ALLOWED_ORIGINS: "http://localhost:3000,http://frontend:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health || exit 0"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: ./apps/frontend
      args:
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
        NEXT_PUBLIC_PROXY_BASE_URL: ${NEXT_PUBLIC_PROXY_BASE_URL}
    ports:
      - "3000:3000"
    depends_on:
      - proxy
