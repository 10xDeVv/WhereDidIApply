server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    tech.wheredidiapply.proxy: INFO
    org.springframework.web.filter.CommonsRequestLoggingFilter: DEBUG

spring:
  jackson:
    deserialization:
      fail-on-unknown-properties: false

proxy:
  cors:
    allowed:
      origins: "${PROXY_CORS_ALLOWED_ORIGINS:http://localhost:3000,https://wheredidiapply.tech}"

  token:
    secret: "${RUN_TOKEN_SECRET}"
    ttl-minutes: 120

  limits:
    max-emails-per-run: 1500
    requests-per-minute-per-run: 200
    max-chars-per-email: 20000

llm:
  api:
    url: https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent
    key: "${GEMINI_API_KEY}"
    timeout-seconds: 60

resilience4j:
  circuitbreaker:
    instances:
      gemini:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10

